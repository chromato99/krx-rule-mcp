services:
  krx-rule-mcp:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: server
    image: krx-rule-mcp:local
    depends_on:
      - krx-rule-embeddings
    ports:
      - "${KRX_MCP_BIND_ADDRESS:-127.0.0.1}:${KRX_MCP_PORT:-8080}:8080"
    environment:
      KRX_MCP_MODE: http
      KRX_MCP_ADDR: ":8080"
      KRX_MCP_BEARER_TOKEN: "${KRX_MCP_BEARER_TOKEN:?Set KRX_MCP_BEARER_TOKEN to a strong random value}"
      KRX_MCP_ALLOWED_ORIGINS: "${KRX_MCP_ALLOWED_ORIGINS:-}"
      KRX_EXPECTED_RELEASE_GENERATION: "${KRX_EXPECTED_RELEASE_GENERATION:-}"
      KRX_SERVER_IMAGE_DIGEST: "${KRX_SERVER_IMAGE_DIGEST:-local-build}"
      KRX_MCP_MAX_QUERY_RUNES: "${KRX_MCP_MAX_QUERY_RUNES:-1000}"
      KRX_MCP_MAX_CONCURRENT_SEARCHES: "${KRX_MCP_MAX_CONCURRENT_SEARCHES:-16}"
      KRX_MCP_MAX_CONCURRENT_REQUESTS: "${KRX_MCP_MAX_CONCURRENT_REQUESTS:-64}"
      KRX_MCP_REQUEST_SIZE_LIMIT: "${KRX_MCP_REQUEST_SIZE_LIMIT:-1048576}"
      KRX_MCP_RESPONSE_SIZE_LIMIT: "${KRX_MCP_RESPONSE_SIZE_LIMIT:-1048576}"
      KRX_MCP_TOOL_OUTPUT_SIZE_LIMIT: "${KRX_MCP_TOOL_OUTPUT_SIZE_LIMIT:-524288}"
      KRX_MCP_EMBEDDING_TIMEOUT: "${KRX_MCP_EMBEDDING_TIMEOUT:-3s}"
      KRX_MCP_REQUEST_TIMEOUT: "${KRX_MCP_REQUEST_TIMEOUT:-30s}"
      KRX_MCP_SHUTDOWN_TIMEOUT: "${KRX_MCP_SHUTDOWN_TIMEOUT:-15s}"
      KRX_RULE_DATA_DIR: /app/data
      KRX_RULE_INDEX_DIR: /app/index
      KRX_DOMAIN_LEXICON_PATH: "${KRX_DOMAIN_LEXICON_PATH:-/app/config/domain-lexicon.yaml}"
      KRX_VECTOR_SEARCH_ENABLED: "${KRX_VECTOR_SEARCH_ENABLED:-true}"
      KRX_VECTOR_SEARCH_POLICY: "${KRX_VECTOR_SEARCH_POLICY:-optional}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-local}"
      KRX_EMBEDDING_BASE_URL: "${KRX_EMBEDDING_BASE_URL:-http://krx-rule-embeddings:80/v1}"
      KRX_EMBEDDING_MODEL: "${KRX_EMBEDDING_MODEL:-intfloat/multilingual-e5-small}"
      KRX_EMBEDDING_MODEL_REVISION: "${KRX_EMBEDDING_MODEL_REVISION:-}"
      KRX_EMBEDDING_DIMENSIONS: "${KRX_EMBEDDING_DIMENSIONS:-384}"
      KRX_EMBEDDING_QUERY_PREFIX: "${KRX_EMBEDDING_QUERY_PREFIX-query: }"
      KRX_EMBEDDING_DOCUMENT_PREFIX: "${KRX_EMBEDDING_DOCUMENT_PREFIX-passage: }"
    volumes:
      - "${KRX_RULE_DATA_DIR:?Set KRX_RULE_DATA_DIR to a generated krx-rule-markdown data directory}:/app/data:ro"
      - "${KRX_RULE_INDEX_DIR:?Set KRX_RULE_INDEX_DIR to a krx-rule-mcp index directory}:/app/index:ro"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 20s

  krx-rule-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command:
      - --model-id
      - "${KRX_TEI_MODEL_ID:-intfloat/multilingual-e5-small}"
    volumes:
      - embeddings-cache:/data
    ports:
      - "127.0.0.1:${KRX_TEI_PORT:-18081}:80"
    restart: unless-stopped

volumes:
  embeddings-cache:
