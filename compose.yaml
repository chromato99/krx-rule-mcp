services:
  krx-rule-mcp:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: server
    image: "${RULE_MCP_IMAGE:-krx-rule-mcp:local}"
    depends_on:
      krx-rule-embeddings:
        condition: service_healthy
        restart: true
    ports:
      - "${RULE_MCP_BIND_ADDRESS:-127.0.0.1}:${RULE_MCP_PORT:-8080}:8080"
    environment:
      RULE_MCP_MODE: http
      RULE_MCP_ADDR: ":8080"
      RULE_MCP_BEARER_TOKEN: "${RULE_MCP_BEARER_TOKEN:?Set RULE_MCP_BEARER_TOKEN to a strong random value}"
      RULE_MCP_ALLOWED_ORIGINS: "${RULE_MCP_ALLOWED_ORIGINS:-}"
      RULE_MCP_EXPECTED_RELEASE_GENERATION: "${RULE_MCP_EXPECTED_RELEASE_GENERATION:-}"
      RULE_MCP_SERVER_IMAGE_DIGEST: "${RULE_MCP_SERVER_IMAGE_DIGEST:-local-build}"
      RULE_MCP_TEI_IMAGE_DIGEST: "${RULE_MCP_TEI_IMAGE_DIGEST:?Set the digest of the selected RULE_MCP_TEI_IMAGE}"
      RULE_MCP_MAX_QUERY_RUNES: "${RULE_MCP_MAX_QUERY_RUNES:-1000}"
      RULE_MCP_MAX_CONCURRENT_SEARCHES: "${RULE_MCP_MAX_CONCURRENT_SEARCHES:-4}"
      RULE_MCP_MAX_CONCURRENT_REQUESTS: "${RULE_MCP_MAX_CONCURRENT_REQUESTS:-16}"
      RULE_MCP_REQUEST_SIZE_LIMIT: "${RULE_MCP_REQUEST_SIZE_LIMIT:-1048576}"
      RULE_MCP_RESPONSE_SIZE_LIMIT: "${RULE_MCP_RESPONSE_SIZE_LIMIT:-1048576}"
      RULE_MCP_TOOL_OUTPUT_SIZE_LIMIT: "${RULE_MCP_TOOL_OUTPUT_SIZE_LIMIT:-524288}"
      RULE_MCP_EMBEDDING_TIMEOUT: "${RULE_MCP_EMBEDDING_TIMEOUT:-5s}"
      RULE_MCP_READINESS_EMBEDDING_TIMEOUT: "${RULE_MCP_READINESS_EMBEDDING_TIMEOUT:-5s}"
      RULE_MCP_REQUEST_TIMEOUT: "${RULE_MCP_REQUEST_TIMEOUT:-40s}"
      RULE_MCP_SHUTDOWN_TIMEOUT: "${RULE_MCP_SHUTDOWN_TIMEOUT:-45s}"
      KRX_RULE_DATA_DIR: /app/data
      KRX_RULE_INDEX_DIR: /app/index
      KRX_DOMAIN_LEXICON_PATH: "${KRX_DOMAIN_LEXICON_PATH:-/app/config/domain-lexicon.yaml}"
      KRX_VECTOR_SEARCH_ENABLED: "true"
      KRX_VECTOR_SEARCH_POLICY: "required"
      KRX_REQUIRE_VECTOR: "true"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-local}"
      KRX_EMBEDDING_BASE_URL: "${KRX_EMBEDDING_BASE_URL:-http://krx-rule-embeddings:80/v1}"
      KRX_EMBEDDING_MODEL: "${KRX_EMBEDDING_MODEL:-intfloat/multilingual-e5-small}"
      KRX_EMBEDDING_MODEL_REVISION: "${KRX_EMBEDDING_MODEL_REVISION:-614241f622f53c4eeff9890bdc4f31cfecc418b3}"
      KRX_EMBEDDING_DIMENSIONS: "${KRX_EMBEDDING_DIMENSIONS:-384}"
      KRX_EMBEDDING_QUERY_PREFIX: "${KRX_EMBEDDING_QUERY_PREFIX-query: }"
      KRX_EMBEDDING_DOCUMENT_PREFIX: "${KRX_EMBEDDING_DOCUMENT_PREFIX-passage: }"
    volumes:
      - "${KRX_RULE_DATA_DIR:?Set KRX_RULE_DATA_DIR to a generated krx-rule-markdown data directory}:/app/data:ro"
      - "${KRX_RULE_INDEX_DIR:?Set KRX_RULE_INDEX_DIR to a krx-rule-mcp index directory}:/app/index:ro"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    restart: unless-stopped
    stop_grace_period: 50s

  krx-rule-embeddings:
    image: "${RULE_MCP_TEI_IMAGE:?Select a TEI image compatible with this runtime}"
    command:
      - --model-id
      - "${RULE_MCP_TEI_MODEL_ID:-intfloat/multilingual-e5-small}"
      - --revision
      - "${KRX_EMBEDDING_MODEL_REVISION:-614241f622f53c4eeff9890bdc4f31cfecc418b3}"
      - --tokenization-workers
      - "${RULE_MCP_TEI_TOKENIZATION_WORKERS:-2}"
      - --max-concurrent-requests
      - "${RULE_MCP_TEI_MAX_CONCURRENT_REQUESTS:-8}"
      - --max-batch-tokens
      - "${RULE_MCP_TEI_MAX_BATCH_TOKENS:-4096}"
    environment:
      RAYON_NUM_THREADS: "${RULE_MCP_TEI_RAYON_NUM_THREADS:-4}"
    volumes:
      - embeddings-cache:/data
    ports:
      - "127.0.0.1:${RULE_MCP_TEI_PORT:-18081}:80"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    restart: unless-stopped

volumes:
  embeddings-cache:
