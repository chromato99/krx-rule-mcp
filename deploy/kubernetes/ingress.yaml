apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: krx-rule-mcp
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - krx-rule-mcp.example.com
      secretName: krx-rule-mcp-tls
  rules:
    - host: krx-rule-mcp.example.com
      http:
        paths:
          # Only the authenticated MCP endpoint is public. Platform probes and
          # metrics remain reachable through the cluster-internal Service.
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: krx-rule-mcp
                port:
                  name: http
