apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: krx-rule-mcp
spec:
  podSelector:
    matchLabels:
      app: krx-rule-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
